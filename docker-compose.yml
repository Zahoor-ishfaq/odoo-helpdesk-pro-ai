services:
  web:
    image: odoo:19.0
    depends_on: [db]
    ports: ["8079:8069"]
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./helpdesk_community_pro_ai:/mnt/extra-addons/helpdesk_community_pro_ai
      - ./helpdesk_community_pro:/mnt/extra-addons/helpdesk_community_pro
      - odoo-web:/var/lib/odoo
    command: odoo --dev=all
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo-db:/var/lib/postgresql/data
volumes:
  odoo-web:
  odoo-db:
